<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | GPG Seguros CRM</title>
  <meta name="description" content="Acceso al CRM de GPG Seguros para productores de seguros.">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Cpath d='M50 15 L80 27 L80 52 Q80 72 50 85 Q20 72 20 52 L20 27 Z' fill='%230ea5e9'/%3E%3Cpath d='M38 50 L47 59 L65 41' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Google Fonts Outfit -->
  <link href="public/css/styles.css" rel="stylesheet">
  <style>
    /* Inline backup path check in case relative css fails */
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="text-center mb-4">
      <div class="user-avatar mx-auto mb-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
        <i class="fa-solid fa-shield-halved text-white"></i>
      </div>
      <h2 class="mb-1">GPG Seguros</h2>
      <p class="text-white-50">CRM de Gestión para PAS</p>
    </div>

    <div id="alertBox" class="alert alert-danger d-none" role="alert">
      Error de autenticación
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="usuario" class="form-label text-white-50 small fw-bold text-uppercase">Usuario</label>
        <div class="input-group">
          <span class="input-group-text login-input bg-transparent border-end-0"><i class="fa-solid fa-user text-white-50"></i></span>
          <input type="text" class="form-control login-input border-start-0" id="usuario" placeholder="Ingrese su usuario" required>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-white-50 small fw-bold text-uppercase">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text login-input bg-transparent border-end-0"><i class="fa-solid fa-lock text-white-50"></i></span>
          <input type="password" class="form-control login-input border-start-0" id="password" placeholder="Ingrese su contraseña" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 login-btn mb-3">
        <i class="fa-solid fa-right-to-bracket me-2"></i> Iniciar Sesión
      </button>
    </form>

    <div class="d-flex align-items-center my-3">
      <hr class="flex-grow-1" style="border-color: rgba(255,255,255,0.15);">
      <span class="mx-3 text-white-50 small">o</span>
      <hr class="flex-grow-1" style="border-color: rgba(255,255,255,0.15);">
    </div>

    <div id="googleBtnContainer" class="d-flex justify-content-center"></div>
  </div>

  <!-- Google Identity Services SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Redirección si ya está logueado
    if (localStorage.getItem('gpg_token')) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('d-none');

      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ usuario, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Guardar token JWT e información del usuario
          localStorage.setItem('gpg_token', data.token);
          localStorage.setItem('gpg_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          alertBox.innerText = data.error || 'Error al conectar con el servidor';
          alertBox.classList.remove('d-none');
        }
      } catch (err) {
        console.error(err);
        alertBox.innerText = 'Error de conexión con el servidor.';
        alertBox.classList.remove('d-none');
      }
    });

    // Google Sign-In
    window.addEventListener('load', () => {
      // Fetch the Google Client ID from the server config endpoint
      fetch('/api/auth/google-client-id')
        .then(r => r.json())
        .then(data => {
          if (!data.clientId) return;
          google.accounts.id.initialize({
            client_id: data.clientId,
            callback: handleGoogleCredential,
          });
          google.accounts.id.renderButton(
            document.getElementById('googleBtnContainer'),
            {
              theme: 'filled_blue',
              size: 'large',
              width: '100%',
              text: 'signin_with',
              shape: 'pill',
              logo_alignment: 'left'
            }
          );
        })
        .catch(err => console.warn('Google Sign-In no disponible:', err));
    });

    async function handleGoogleCredential(response) {
      alertBox.classList.add('d-none');
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('gpg_token', data.token);
          localStorage.setItem('gpg_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          alertBox.innerText = data.error || 'Error al autenticar con Google';
          alertBox.classList.remove('d-none');
        }
      } catch (err) {
        console.error(err);
        alertBox.innerText = 'Error de conexión con el servidor.';
        alertBox.classList.remove('d-none');
      }
    }
  </script>
</body>
</html>
